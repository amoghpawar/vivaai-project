<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>VivaAI</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #0f0f1a; color: #eee; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 1.5rem; }
    .card { background: #1a1a2e; padding: 2rem; border-radius: 12px; width: 680px; max-width: 95vw; box-shadow: 0 0 30px #0005; }
    .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
    h1 { color: #7eb8f7; font-size: 1.3rem; }
    #q-counter { color: #888; font-size: 0.85rem; }
    .progress-bar { width: 100%; background: #111; border-radius: 20px; height: 6px; margin-bottom: 1rem; }
    .progress-fill { height: 6px; background: #3a86ff; border-radius: 20px; transition: width 0.4s; }
    #question-box { background: #111; padding: 1rem; border-radius: 8px; border-left: 4px solid #3a86ff; margin-bottom: 1rem; }
    #question-text { color: #fff; font-size: 1.05rem; line-height: 1.5; }
    #meta { color: #888; font-size: 0.82rem; margin-top: 0.4rem; }
    textarea { width: 100%; padding: 0.75rem; background: #111; color: #eee; border: 1px solid #333; border-radius: 8px; font-size: 1rem; resize: vertical; margin-top: 0.5rem; }
    textarea:focus { outline: none; border-color: #3a86ff; }
    .btn-row { margin-top: 0.75rem; display: flex; flex-wrap: wrap; gap: 0.4rem; }
    button { padding: 0.6rem 1.1rem; background: #3a86ff; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 0.9rem; }
    button:hover { background: #265dcb; }
    button:disabled { background: #555; cursor: not-allowed; }
    #hint-btn { background: #7c3aed; }
    #hint-btn:hover { background: #5b21b6; }
    #skip-btn { background: #e85d4a; display: none; }
    #skip-btn:hover { background: #c0392b; }
    #hint-box { display: none; background: #1a1040; border: 1px solid #7c3aed; border-radius: 8px; padding: 0.75rem; margin-top: 0.75rem; color: #c4b5fd; font-size: 0.9rem; }
    #recording { color: #ff4d4d; display: none; margin-top: 0.5rem; font-size: 0.9rem; }
    #result { margin-top: 1rem; padding: 1rem; background: #111; border-radius: 8px; border-left: 4px solid #7eb8f7; display: none; }
    .logout-link { color: #555; font-size: 0.8rem; cursor: pointer; }
    .logout-link:hover { color: #f87171; }
  </style>
</head>
<body>
<div class="card">
  <div class="top-bar">
    <h1>🎓 VivaAI</h1>
    <div style="display:flex;gap:1rem;align-items:center">
      <span id="q-counter">Question 1 of 5</span>
      <span class="logout-link" onclick="window.location='/api/logout'">Logout</span>
    </div>
  </div>
  <div class="progress-bar"><div class="progress-fill" id="progress" style="width:0%"></div></div>
  <div id="question-box">
    <p id="question-text">Loading question...</p>
    <p id="meta"></p>
  </div>
  <textarea id="answer" rows="5" placeholder="Type your answer here..."></textarea>
  <div id="hint-box">💡 <b>Hint:</b> <span id="hint-text"></span></div>
  <div class="btn-row">
    <button id="mic-btn" onclick="startMic()">🎤 Speak</button>
    <button onclick="submitAnswer()">✅ Submit</button>
    <button id="hint-btn" onclick="getHint()">💡 Hint (-10%)</button>
    <button id="skip-btn" onclick="skipQuestion()">⏭ Skip</button>
  </div>
  <p id="recording">🔴 Recording... (click Speak again to stop)</p>
  <div id="result"></div>
</div>
<script src="/static/app.js"></script>
</body>
</html>
