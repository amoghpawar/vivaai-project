<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>VivaAI – Login</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #0f0f1a; color: #eee; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .card { background: #1a1a2e; padding: 2.5rem; border-radius: 14px; width: 420px; max-width: 95vw; box-shadow: 0 0 40px #0008; }
    .logo { text-align: center; margin-bottom: 1.5rem; }
    .logo h1 { font-size: 2rem; color: #7eb8f7; }
    .logo p { color: #888; font-size: 0.9rem; margin-top: 0.3rem; }
    .tabs { display: flex; margin-bottom: 1.5rem; border-bottom: 2px solid #333; }
    .tab { flex: 1; padding: 0.6rem; text-align: center; cursor: pointer; color: #888; font-size: 0.95rem; transition: all 0.2s; }
    .tab.active { color: #7eb8f7; border-bottom: 2px solid #7eb8f7; margin-bottom: -2px; font-weight: bold; }
    .form-section { display: none; }
    .form-section.active { display: block; }
    label { font-size: 0.85rem; color: #aaa; display: block; margin-bottom: 0.3rem; margin-top: 1rem; }
    input { width: 100%; padding: 0.75rem; background: #111; color: #eee; border: 1px solid #333; border-radius: 8px; font-size: 1rem; }
    input:focus { outline: none; border-color: #3a86ff; }
    button { width: 100%; padding: 0.8rem; margin-top: 1.5rem; background: #3a86ff; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 1rem; font-weight: bold; border-radius: 8px; }
    button:hover { background: #265dcb; }
    #login-msg, #signup-msg { text-align: center; margin-top: 1rem; font-size: 0.9rem; min-height: 1.2rem; }
    .error { color: #f87171; }
    .success { color: #4ade80; }
    .hint { text-align: center; color: #555; font-size: 0.8rem; margin-top: 1rem; border-top: 1px solid #222; padding-top: 1rem; }
    .hint b { color: #7eb8f7; }
  </style>
</head>
<body>
<div class="card">
  <div class="logo">
    <h1>🎓 VivaAI</h1>
    <p>AI-Based Viva Examination System</p>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <div class="tab active" onclick="switchTab('login')">Login</div>
    <div class="tab" onclick="switchTab('signup')">Sign Up</div>
  </div>

  <!-- Login Form -->
  <div class="form-section active" id="login-form">
    <label>Email Address</label>
    <input type="email" id="login-email" placeholder="Enter your email" />
    <label>Password</label>
    <input type="password" id="login-password" placeholder="Enter your password"
           onkeydown="if(event.key==='Enter') login()" />
    <button onclick="login()">Login →</button>
    <p id="login-msg"></p>
  <p class="hint">Demo account: <b>test@gmail.com</b> / <b>1234</b></p>
  </div>

  <!-- Signup Form -->
  <div class="form-section" id="signup-form">
    <label>Full Name</label>
    <input type="text" id="signup-name" placeholder="Enter your full name" />
    <label>Email Address</label>
    <input type="email" id="signup-email" placeholder="Enter your email" />
    <label>Password</label>
    <input type="password" id="signup-password" placeholder="Create a password" />
    <label>Confirm Password</label>
    <input type="password" id="signup-confirm" placeholder="Confirm your password"
           onkeydown="if(event.key==='Enter') signup()" />
    <button onclick="signup()">Create Account →</button>
    <p id="signup-msg"></p>
  </div>
</div>

<script>
function switchTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.form-section').forEach(f => f.classList.remove('active'));
  document.querySelector(`.tab:${tab === 'login' ? 'first-child' : 'last-child'}`).classList.add('active');
  document.getElementById(tab + '-form').classList.add('active');
  document.getElementById('login-msg').textContent = '';
  document.getElementById('signup-msg').textContent = '';
}

async function login() {
  const email = document.getElementById("login-email").value.trim();
  const password = document.getElementById("login-password").value.trim();
  const msg = document.getElementById("login-msg");

  // Validation
  if (!email && !password) { msg.className = 'error'; msg.textContent = "⚠️ Please enter your email and password."; return; }
  if (!email) { msg.className = 'error'; msg.textContent = "⚠️ Please enter your email address."; return; }
  if (!validateEmail(email)) { msg.className = 'error'; msg.textContent = "⚠️ Please enter a valid email address."; return; }
  if (!password) { msg.className = 'error'; msg.textContent = "⚠️ Please enter your password."; return; }

  msg.className = ''; msg.textContent = "🔄 Logging in...";

  try {
    const res = await fetch("/api/login", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ email, password })
    });
    const data = await res.json();
    if (data.success) {
      msg.className = 'success';
      msg.textContent = "✅ Login successful! Redirecting...";
      window.location.href = "/subject";
    } else {
      msg.className = 'error';
      msg.textContent = "❌ " + data.message;
    }
  } catch(e) {
    msg.className = 'error';
    msg.textContent = "❌ Server error. Is Flask running?";
  }
}

function validateEmail(email) {
  return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
}

async function signup() {
  const name = document.getElementById("signup-name").value.trim();
  const email = document.getElementById("signup-email").value.trim();
  const password = document.getElementById("signup-password").value.trim();
  const confirm = document.getElementById("signup-confirm").value.trim();
  const msg = document.getElementById("signup-msg");

  // Validation — specific messages
  if (!name) { msg.className = 'error'; msg.textContent = "⚠️ Please enter your full name."; return; }
  if (!email) { msg.className = 'error'; msg.textContent = "⚠️ Please enter your email address."; return; }
  if (!validateEmail(email)) { msg.className = 'error'; msg.textContent = "⚠️ Please enter a valid email (e.g. john@gmail.com)."; return; }
  if (!password) { msg.className = 'error'; msg.textContent = "⚠️ Please create a password."; return; }
  if (password.length < 4) { msg.className = 'error'; msg.textContent = "⚠️ Password must be at least 4 characters."; return; }
  if (!confirm) { msg.className = 'error'; msg.textContent = "⚠️ Please confirm your password."; return; }
  if (password !== confirm) { msg.className = 'error'; msg.textContent = "⚠️ Passwords do not match. Please try again."; return; }

  msg.className = ''; msg.textContent = "🔄 Creating account...";

  try {
    const res = await fetch("/api/signup", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ name, email, password })
    });
    const data = await res.json();
    if (data.success) {
      msg.className = 'success';
      msg.textContent = "✅ Account created! Switching to login...";
      // Clear signup fields
      document.getElementById("signup-name").value = "";
      document.getElementById("signup-email").value = "";
      document.getElementById("signup-password").value = "";
      document.getElementById("signup-confirm").value = "";
      setTimeout(() => {
        switchTab('login');
        document.getElementById("login-msg").className = 'success';
        document.getElementById("login-msg").textContent = "✅ Account created! Please login.";
      }, 800);
    } else {
      msg.className = 'error';
      msg.textContent = "❌ " + data.message;
    }
  } catch(e) {
    msg.className = 'error';
    msg.textContent = "❌ Server error. Is Flask running?";
  }
}
</script>
</body>
</html>
